version: '3.8'

services:
  app:
    build: .
    container_name: doxora-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - doxora-network
    env_file: .env.production

  nginx:
    image: nginx:alpine
    container_name: doxora-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - doxora-network

networks:
  doxora-network:
    driver: bridge
